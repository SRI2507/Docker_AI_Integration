services:
  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag-network

  api:
    build: ./api
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_MODEL=llama3
      - EMBED_MODEL=nomic-embed-text
    depends_on:
      - ollama
      - qdrant
    networks:
      - rag-network

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - rag-network

volumes:
  ollama_data:
  qdrant_data:

networks:
  rag-network:
    driver: bridge
